<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unknown Yuzuke</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f0f0f, #1a1a2e);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1rem;
      color: #ccc;
    }
    .box {
      max-width: 500px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }
    .btn {
      display: block;
      margin: 12px auto;
      padding: 12px;
      width: 80%;
      max-width: 250px;
      border-radius: 12px;
      background: #6c63ff;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Unknown Yuzuke</h1>
    <p>MLBB Creator • Gamer • Editor</p>

    <a class="btn" href="https://youtube.com/" target="_blank">YouTube</a>
    <a class="btn" href="https://instagram.com/" target="_blank">Instagram</a>
    <a class="btn" href="https://facebook.com/" target="_blank">Facebook</a>
  </div>
</body>
</html>
